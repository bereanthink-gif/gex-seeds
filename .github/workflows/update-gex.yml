name: Update GEX seed data

on:
  schedule:
    # 08:35 ET pre-market, both DST and standard time (the off-season run is
    # harmless — it just rewrites the same day's row an hour early/late).
    - cron: "35 12 * * 1-5"
    - cron: "35 13 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute GEX levels and write seed CSVs
        run: python scripts/update_seeds.py --symbols QQQ,SPY,GLD

      - name: Commit and push
        run: |
          git config user.name "gex-seeds-bot"
          git config user.email "actions@github.com"
          git add data symbol_info levels.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "GEX levels $(date -u +%F)"
          git push
